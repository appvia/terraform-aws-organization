---
name: Terraform
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-organization:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@108a4a75468886508a8279d5825df1164a994a00 # main
    name: Organization Module Validation
    with:
      working-directory: examples/basic

  validate-delegation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@108a4a75468886508a8279d5825df1164a994a00 # main
    name: Delegation Module Validation
    with:
      working-directory: modules/delegation

  validate-service-quotas:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@108a4a75468886508a8279d5825df1164a994a00 # main
    name: Service Quotas Module Validation
    with:
      working-directory: modules/service_quotas
